services:
  postgres:
    image: postgres:16-alpine
    container_name: kesbyar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kesbyar
      POSTGRES_PASSWORD: kesbyar
      POSTGRES_DB: kesbyar
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kesbyar -d kesbyar"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    container_name: kesbyar-ai
    restart: unless-stopped
    environment:
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?AI_SERVICE_TOKEN required}
      DATABASE_URL: postgresql://kesbyar:kesbyar@postgres:5432/kesbyar
      DEBUG: "true"
      LOG_LEVEL: debug
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

