name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — lint, test, build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://kesbyar:kesbyar@localhost:5432/kesbyar?schema=public
      SESSION_SECRET: ci-session-secret-min-16-chars
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AI_SERVICE_URL: http://localhost:8000
      AI_SERVICE_TOKEN: ci-internal-token
      NODE_ENV: test
      APP_ENV: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kesbyar
          POSTGRES_PASSWORD: kesbyar
          POSTGRES_DB: kesbyar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kesbyar -d kesbyar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build web
        run: npm run build

  ai-service:
    name: AI service — validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app

      - name: Import smoke test
        run: python -c "from app.main import app; assert app.title"

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [web, ai-service]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t kesbyar-web:ci .

      - name: Build AI image
        run: docker build -f apps/ai-service/Dockerfile -t kesbyar-ai:ci apps/ai-service
